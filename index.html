<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #1a0a00;
    color: #fff;
    font-family: 'DM Sans', sans-serif;

    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    background: linear-gradient(90deg, #8B0000, #cc0000, #8B0000);
    padding: 2px 12px;
    display: grid;
    grid-template-columns: 190px 1fr 100px;
    align-items: center;
    gap: 10px;
    border-bottom: 3px solid #ffd700;
    flex-shrink: 0;

  .marca-box { text-align:left; }

    font-family:'Bebas Neue', sans-serif;
    font-size:20px; letter-spacing:2px; color:#ffd700; line-height:1;

    font-size:9px; color:#fff; letter-spacing:1px; text-transform:uppercase;

  .sorteo-badge {
    display: grid;
    grid-template-columns: auto auto auto auto;
    align-items: center;
    justify-content: center;

  /* FECHA — sin hora */
  .header-right {
    display: flex;
    flex-direction: column;

  /* MAIN */
  .main { flex:1; display:flex; overflow:hidden; }

  /* CABEZAS */
  .col-cabezas {
    width: 240px;

  .cabezas-header {

    flex-shrink:0;
  }
  .cabezas-section { border-bottom:1px solid rgba(255,215,0,0.25); flex-shrink:0; }
  .cabezas-section-title {
    background: rgba(255,215,0,0.1);
    padding: 2px 10px;
    font-size: 12px; color: #ffd700;
    letter-spacing: 2px; text-transform: uppercase; font-weight: 700;

  .cabeza-row {
    display: flex; align-items: center; justify-content: space-between;

    border-bottom: 1px solid rgba(255,255,255,0.04);

  .cabeza-prov {
    font-size: 16px; color: rgba(255,255,255,0.65);

  .cabeza-num {
    font-family: 'Oswald', sans-serif;

  }

  /* TABLA */
  .col-tabla { flex:1; display:flex; flex-direction:column; overflow:hidden; }

  .provincias-header {
    display: grid;
    grid-template-columns: 70px repeat(5,1fr);
    background: #8B0000;
    border-bottom: 1px solid #ffd700;
    flex-shrink: 0;

  .prov-cell {
    padding: 5px 4px; text-align: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px;

  .prov-cell:last-child { border-right: none; }
  .prov-cell.label {
    color: rgba(255,255,255,0.4); font-size: 11px;
    display: flex; align-items: center; justify-content: center;
  }

  /* NÚMEROS */
  .numeros-wrap { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .numeros-grid {
    flex: 1;

  .pos-col { display:flex; flex-direction:column; border-right:1px solid rgba(255,215,0,0.15); }
  .pos-label {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: rgba(255,255,255,0.45);

  .pos-label:last-child { border-bottom: none; }

  .num-col { display:flex; flex-direction:column; border-right:1px solid rgba(255,255,255,0.07); }
  .num-col:last-child { border-right: none; }

  /* Oswald Bold — 0 oval claramente distinto del 8 redondeado */
  .num-cell {
    flex: 1; display: flex; align-items: center; justify-content: center;

    font-size: clamp(24px, 2.3vw, 34px);

  .num-cell.empty { color: rgba(255,255,255,0.2); font-size: 14px; letter-spacing: 2px; }

<div class="header">

<!-- OVERLAY DE CARTELES — tapa toda la pantalla mientras se muestra un cartel -->
<div id="carteles-overlay" style="display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;padding:60px;text-align:center;word-break:break-word;line-height:1.3;"></div>

<script>
// =====================
// DATOS — vacíos por defecto (se llenan desde Supabase)
// =====================
const datos = {};
const sorteoKeys = ['previa','primera','matutina','vespertina','nocturna'];
const provKeys   = ['chaquena','ciudad','provincia','corrientes','cordoba'];
let cantidadTV = {}; // ej: { chaquena:20, corrientes:10, ... } — se completa desde configuracion_visual

function cantidadProvinciaTV(key) {
  return cantidadTV[key] || 20; // 20 = default si nunca se configuró para esta agencia
}

sorteoKeys.forEach(s => {
  datos[s] = {};
  provKeys.forEach(p => { datos[s][p] = Array(20).fill('----'); });
});

// cabezasParaMostrar: lista de hasta 4 sorteos anteriores (ya resueltos, saltando feriados),
// en orden cronológico (el más viejo primero, el más reciente último)
let cabezasParaMostrar = [];

// Cuál es el sorteo/fecha que REALMENTE se está mostrando ahora (después de aplicar feriados)
let slotEfectivo = { fecha: null, key: null, label: null, live: false };

// mapaSorteosActivos['2026-07-09']['previa'] = false  → construido desde configuracion_sorteos
let mapaSorteosActivos = {};

const LABELS_SORTEO = { previa:'PREVIA', primera:'PRIMERA', matutina:'MATUTINA', vespertina:'VESPERTINA', nocturna:'NOCTURNA' };

// =====================
// RESOLUCIÓN DE FERIADOS — camina hacia atrás sorteo por sorteo hasta encontrar uno activo
// =====================

// El sorteo inmediatamente anterior en la secuencia (cruza de un día al anterior en 'previa')
function sorteoAnterior(fecha, sorteoKey) {
  const idx = sorteoKeys.indexOf(sorteoKey);
  if (idx > 0) return { fecha, sorteoKey: sorteoKeys[idx - 1] };
  const partes = fecha.split('-');
  const d = new Date(parseInt(partes[0]), parseInt(partes[1]) - 1, parseInt(partes[2]));
  d.setDate(d.getDate() - 1);
  return { fecha: fechaLocalStr(d), sorteoKey: 'nocturna' };
}

// Trae de Supabase la configuración de "fecha especial" de los últimos ~30 días
// (ventana de sobra para poder caminar hacia atrás varios feriados seguidos)
async function cargarMapaSorteosActivos(hastaFecha) {
  mapaSorteosActivos = {};
  const partes = hastaFecha.split('-');
  const desde = new Date(parseInt(partes[0]), parseInt(partes[1]) - 1, parseInt(partes[2]));
  desde.setDate(desde.getDate() - 30);
  const desdeStr = fechaLocalStr(desde);
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/configuracion_sorteos?fecha_especial=gte.${desdeStr}&fecha_especial=lte.${hastaFecha}&select=fecha_especial,sorteo,activo`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const rows = await res.json();
    (rows || []).forEach(r => {
      if (!mapaSorteosActivos[r.fecha_especial]) mapaSorteosActivos[r.fecha_especial] = {};
      mapaSorteosActivos[r.fecha_especial][r.sorteo] = r.activo;
    });
  } catch(e) { console.error('Error cargando fechas especiales:', e); }
}

// ¿Ese sorteo, en esa fecha, está activo? Domingo es SIEMPRE inactivo (regla estructural,
// no depende de ninguna configuración). El resto depende de si hay una fila en configuracion_sorteos;
// si no hay ninguna fila para esa fecha+sorteo, se considera un día normal (activo).
function activoEn(fecha, sorteoKey) {
  const partes = fecha.split('-');
  const d = new Date(parseInt(partes[0]), parseInt(partes[1]) - 1, parseInt(partes[2]));
  if (d.getDay() === 0) return false;
  if (mapaSorteosActivos[fecha] && mapaSorteosActivos[fecha][sorteoKey] !== undefined) {
    return mapaSorteosActivos[fecha][sorteoKey];
  }
  return true;
}

// A partir del slot "natural" (el que tocaría por horario), camina hacia atrás
// hasta encontrar el último sorteo realmente activo.
function resolverSlotEfectivo(fechaNatural, sorteoKeyNatural) {
  let actual = { fecha: fechaNatural, sorteoKey: sorteoKeyNatural };
  let vueltas = 0;
  while (!activoEn(actual.fecha, actual.sorteoKey) && vueltas < 200) {
    actual = sorteoAnterior(actual.fecha, actual.sorteoKey);
    vueltas++;
  }
  return actual;
}

// Un día calendario antes (no confundir con sorteoAnterior, que además puede cambiar de sorteo)
function diaAnterior(fechaStr) {
  const partes = fechaStr.split('-');
  const d = new Date(parseInt(partes[0]), parseInt(partes[1]) - 1, parseInt(partes[2]));
  d.setDate(d.getDate() - 1);
  return fechaLocalStr(d);
}

// Para un SORTEO FIJO (ej. 'previa'), busca la última fecha en la que ya se completó,
// respecto de la fecha/sorteo que se está mostrando como "sorteo actual". Si ese sorteo
// ocurre más temprano en el día que el que está en pantalla, ya pasó HOY; si no, hay que
// ir al día anterior. Si ese día está inactivo (feriado), sigue retrocediendo día por día.
function fechaMasRecienteParaSlot(slotKey, fechaEfectiva, keyEfectivo) {
  const esAnteriorEnElDia = sorteoKeys.indexOf(slotKey) < sorteoKeys.indexOf(keyEfectivo);
  let fecha = esAnteriorEnElDia ? fechaEfectiva : diaAnterior(fechaEfectiva);
  let vueltas = 0;
  while (!activoEn(fecha, slotKey) && vueltas < 60) {
    fecha = diaAnterior(fecha);
    vueltas++;
  }
  return fecha;
}

// =====================
// LÓGICA HORARIA
// =====================
function getSorteoActual() {
  const now = new Date();
  const totalMin = now.getHours() * 60 + now.getMinutes();

  // Domingo: mostrar nocturna del sábado
  if (now.getDay() === 0) return { key:'nocturna', label:'NOCTURNA', live:false };
  // Lunes antes de 10:15: nocturna del sábado
  if (now.getDay() === 1 && totalMin < 10*60+15) return { key:'nocturna', label:'NOCTURNA', live:false };

  if (totalMin < 10*60+15) return { key:'nocturna',    label:'NOCTURNA',    live:false };
  if (totalMin < 12*60)    return { key:'previa',      label:'PREVIA',      live: totalMin < 10*60+30 };
  if (totalMin < 15*60)    return { key:'primera',     label:'PRIMERA',     live: totalMin < 12*60+15 };
  if (totalMin < 18*60)    return { key:'matutina',    label:'MATUTINA',    live: totalMin < 15*60+15 };
  if (totalMin < 21*60)    return { key:'vespertina',  label:'VESPERTINA',  live: totalMin < 18*60+15 };
  return                          { key:'nocturna',    label:'NOCTURNA',    live: totalMin < 21*60+15 };
}


// =====================
// RENDER
// =====================
function render() {
  const sorteo = slotEfectivo; // ya resuelto (considerando feriados) en el ciclo de carga
  const d = datos[sorteo.key];

  // Badge nombre
  document.getElementById('badge-name').textContent = sorteo.label;

  // Fecha del sorteo — la del slot YA resuelto, para que coincida con los números que se ven
  const partes = sorteo.fecha.split('-');
  const fechaSorteo = new Date(parseInt(partes[0]), parseInt(partes[1])-1, parseInt(partes[2]));
  const diasNombre  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const mesesNombre = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('badge-fecha').textContent =
    `${diasNombre[fechaSorteo.getDay()]}, ${fechaSorteo.getDate()} de ${mesesNombre[fechaSorteo.getMonth()]}`;

  // Determinar si hay números cargados
  const hayNumeros = provKeys.some(p => d[p].some(n => n !== '----' && n !== '——'));
  const badge = document.getElementById('sorteo-badge');
  const label = document.getElementById('badge-label');
  const esDomingo = fechaSorteo.getDay() === 0; // no debería pasar nunca (domingo siempre se salta), queda como resguardo

  if (esDomingo || hayNumeros) {
    // Domingo siempre FINALIZADO. Con datos también FINALIZADO (incluye feriados: al mostrar
    // el último sorteo real, ya tiene números cargados, así que cae acá directamente).
    badge.className = 'sorteo-badge finalizado';
    label.textContent = '✓ FINALIZADO';
    label.className = 'done-label';
  } else if (sorteo.live) {
    // En vivo — SORTEANDO
    badge.className = 'sorteo-badge sorteando';
    label.textContent = 'SORTEANDO';
    label.className = 'live-label';
  } else {
    // Sin datos y no en vivo — PENDIENTE
    badge.className = 'sorteo-badge';
    label.textContent = 'PENDIENTE';
    label.className = 'done-label';
  }

  // Números
  const grid = document.getElementById('numeros-grid');
  const maxFilas = Math.max(...provKeys.map(p => cantidadProvinciaTV(p)));

  let html = '<div class="pos-col">';
  for (let i=1; i<=maxFilas; i++) html += `<div class="pos-label">${String(i).padStart(2,'0')}°</div>`;
  html += '</div>';

  provKeys.forEach(p => {
    const filas = cantidadProvinciaTV(p);
    html += '<div class="num-col">';
    for (let idx = 0; idx < maxFilas; idx++) {
      if (idx >= filas) {
        // Esta provincia tiene menos números configurados: fila invisible, solo para mantener alineadas las columnas
        html += `<div class="num-cell filler"></div>`;
        continue;
      }
      const num = d[p][idx];
      const isEmpty = num === '----' || num === '——';
      const isFirst = idx === 0 && !isEmpty;
      let cls = 'num-cell';
      if (isEmpty) cls += ' empty';
      else if (isFirst) cls += ' primero';
      else if (sorteo.live && !isEmpty) cls += ' live-num';
      html += `<div class="${cls}">${num}</div>`;
    }
    html += '</div>';
  });
  grid.innerHTML = html;

  // Cabezas — ya vienen resueltas (cargarCabezasReales las dejó en cabezasParaMostrar)
  let cabHtml = '';
  cabezasParaMostrar.forEach(s => {
    cabHtml += `<div class="cabezas-section">
      <div class="cabezas-section-title">${s.sorteo}</div>
      <div class="cabeza-row"><div class="cabeza-prov">Chaqueña</div><div class="cabeza-num">${s.chaquena}</div></div>
      <div class="cabeza-row"><div class="cabeza-prov">Ciudad</div><div class="cabeza-num">${s.ciudad}</div></div>
      <div class="cabeza-row"><div class="cabeza-prov">Provincia</div><div class="cabeza-num">${s.provincia}</div></div>
      <div class="cabeza-row"><div class="cabeza-prov">Corrientes</div><div class="cabeza-num">${s.corrientes}</div></div>
      <div class="cabeza-row"><div class="cabeza-prov">Córdoba</div><div class="cabeza-num">${s.cordoba}</div></div>
    </div>`;
  });
  document.getElementById('cabezas-content').innerHTML = cabHtml;
}

// =====================
// FECHA (sin hora)
// =====================
// =====================
// SUPABASE
// =====================
// Leer agencia de la URL (?agencia=670-15) o usar la principal por defecto
const URL_AGENCIA_ID = new URLSearchParams(window.location.search).get('agencia') || '670-00';
const URL_AGENCIA_ENCODED = encodeURIComponent(URL_AGENCIA_ID);

const SUPABASE_URL = 'https://tpqmmktgkvdtpxdmdfzl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_IvCH3LrdfZmCSwbN0TGvCg_-FuOVyYM';

async function cargarDatosReales(fechaStr, sorteoKey) {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/resultados?fecha=eq.${fechaStr}&sorteo=eq.${sorteoKey}&agencia_id=eq.${URL_AGENCIA_ENCODED}&order=posicion.asc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const rows = await res.json();

    // Armar mapa siempre — con ---- si no hay dato
    const provMap = {};
    provKeys.forEach(p => { provMap[p] = Array(20).fill('----'); });

    if (rows && rows.length > 0) {
      rows.forEach(r => {
        if (provMap[r.provincia] && r.posicion >= 1 && r.posicion <= 20) {
          provMap[r.provincia][r.posicion - 1] = r.numero;
        }
      });
    }
    return provMap;
  } catch(e) {
    console.error('Error Supabase:', e);
    const vacio = {};
    provKeys.forEach(p => { vacio[p] = Array(20).fill('----'); });
    return vacio;
  }
}

async function cargarCabezasReales(fechaEfectiva, sorteoEfectivo) {
  const diasNombres = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  // Posiciones FIJAS: siempre Previa, Primera, Matutina, Vespertina, Nocturna en ese orden,
  // salvo el que está en pantalla ahora mismo (ese se saca de la lista, no se repite)
  const slotsAMostrar = sorteoKeys.filter(s => s !== sorteoEfectivo);

  const datosPorSlot = [];
  for (const slot of slotsAMostrar) {
    const fecha = fechaMasRecienteParaSlot(slot, fechaEfectiva, sorteoEfectivo);
    let entrada = { chaquena:'----', ciudad:'----', provincia:'----', corrientes:'----', cordoba:'----' };
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/resultados?fecha=eq.${fecha}&sorteo=eq.${slot}&agencia_id=eq.${URL_AGENCIA_ENCODED}&posicion=eq.1`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
      );
      const rows = await res.json();
      if (rows && rows.length > 0) {
        const traido = {};
        rows.forEach(r => { traido[r.provincia] = r.numero; });
        entrada = {
          chaquena:   traido.chaquena   || '----',
          ciudad:     traido.ciudad     || '----',
          provincia:  traido.provincia  || '----',
          corrientes: traido.corrientes || '----',
          cordoba:    traido.cordoba    || '----',
        };
      }
    } catch(e) { console.error('Error cabeza', slot, e); }

    const partes = fecha.split('-');
    const d = new Date(parseInt(partes[0]), parseInt(partes[1]) - 1, parseInt(partes[2]));
    const nombreDia = diasNombres[d.getDay()];
    const labelSorteo = LABELS_SORTEO[slot];
    const labelCapitalizado = labelSorteo.charAt(0) + labelSorteo.slice(1).toLowerCase();
    datosPorSlot.push({ sorteo: `${labelCapitalizado} ${nombreDia}`, ...entrada });
  }

  // Ya vienen en el orden fijo correcto (Previa→Primera→Matutina→Vespertina→Nocturna, sin el actual)
  cabezasParaMostrar = datosPorSlot;
}

// =====================
async function cargarNumeroSorteo(fechaStr, sorteoKey) {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/sorteos_info?fecha=eq.${fechaStr}&sorteo=eq.${sorteoKey}&agencia_id=eq.${URL_AGENCIA_ENCODED}`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const rows = await res.json();
    const el = document.getElementById('badge-nsorteo');
    if (rows && rows.length > 0 && rows[0].numero_sorteo) {
      el.textContent = `SORTEO N° ${rows[0].numero_sorteo}`;
    } else {
      el.textContent = '';
    }
  } catch(e) { console.error('Error nro sorteo:', e); }
}

// =====================
// CONFIGURACIÓN VISUAL DINÁMICA
// =====================
function fechaLocalStrTV(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Resuelve la cantidad por provincia para el sorteo actual: primero busca si hay una
// PROGRAMACIÓN activa hoy (fecha_desde <= hoy <= fecha_hasta, o sin fecha_hasta = para siempre);
// si no hay ninguna, usa la configuración base de ese sorteo (clave numeros_<sorteo>).
async function cargarCantidadTV(sorteoKey) {
  cantidadTV = {};
  const hoy = fechaLocalStrTV(new Date());
  try {
    const resProg = await fetch(
      `${SUPABASE_URL}/rest/v1/programaciones_numeros?agencia_id=eq.${URL_AGENCIA_ENCODED}&sorteo=eq.${sorteoKey}&fecha_desde=lte.${hoy}&or=(fecha_hasta.is.null,fecha_hasta.gte.${hoy})&order=fecha_desde.desc&limit=1`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const prog = await resProg.json();
    if (prog && prog[0] && prog[0].numeros_por_provincia) {
      cantidadTV = prog[0].numeros_por_provincia;
      return;
    }
  } catch(e) { console.error('Error programaciones TV:', e); }

  try {
    const resBase = await fetch(
      `${SUPABASE_URL}/rest/v1/configuracion_visual?agencia_id=eq.${URL_AGENCIA_ENCODED}&clave=eq.numeros_${sorteoKey}&select=numeros_por_provincia`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const base = await resBase.json();
    if (base && base[0] && base[0].numeros_por_provincia) {
      cantidadTV = base[0].numeros_por_provincia;
    }
  } catch(e) { console.error('Error config base TV:', e); }
}

// =====================
// CARTELES — bloque rotativo que tapa la pantalla cada tantos minutos
// =====================
let cartelesConfig = { frecuenciaMin: 60, lista: [] };
let proximaRotacionCarteles = null; // timestamp en ms
let bloqueCartelesEnCurso = false;

function esperarMs(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

async function cargarConfigCarteles() {
  try {
    const resFrec = await fetch(
      `${SUPABASE_URL}/rest/v1/configuracion_visual?agencia_id=eq.${URL_AGENCIA_ENCODED}&clave=eq.carteles_frecuencia&select=valor`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const filas = await resFrec.json();
    cartelesConfig.frecuenciaMin = (filas && filas[0] && parseInt(filas[0].valor, 10)) || 60;
  } catch(e) { console.error('Error frecuencia carteles:', e); }

  try {
    const resCarteles = await fetch(
      `${SUPABASE_URL}/rest/v1/carteles?agencia_id=eq.${URL_AGENCIA_ENCODED}&activo=eq.true&order=posicion.asc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const filas = await resCarteles.json();
    // Un cartel sin texto no entra en la rotación
    // Un cartel sin ninguna línea con texto no entra en la rotación
    cartelesConfig.lista = (filas || []).filter(c => Array.isArray(c.lineas) && c.lineas.some(l => l.texto && l.texto.trim() !== ''));
  } catch(e) { console.error('Error cargando carteles:', e); cartelesConfig.lista = []; }
}

function escaparHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function mostrarCartelOverlay(cartel) {
  const overlay = document.getElementById('carteles-overlay');
  overlay.style.display = 'flex';
  overlay.style.flexDirection = 'column';
  overlay.style.gap = '10px';
  overlay.style.background = cartel.color_fondo || '#1a1a2e';
  overlay.style.color = cartel.color_texto || '#ffffff';
  overlay.style.fontFamily = `'${cartel.fuente || 'Bebas Neue'}', sans-serif`;
  overlay.style.fontWeight = cartel.negrita ? '700' : '400';
  overlay.style.fontStyle = cartel.cursiva ? 'italic' : 'normal';
  overlay.style.textDecoration = cartel.subrayado ? 'underline' : 'none';

  const lineas = Array.isArray(cartel.lineas) ? cartel.lineas : [];
  overlay.innerHTML = lineas
    .filter(l => l.texto && l.texto.trim() !== '')
    .map(l => `<div style="font-size:${l.tamano || 32}px;">${escaparHtml(l.texto)}</div>`)
    .join('');
}

function ocultarCartelOverlay() {
  document.getElementById('carteles-overlay').style.display = 'none';
}

function programarProximaRotacionCarteles() {
  proximaRotacionCarteles = Date.now() + cartelesConfig.frecuenciaMin * 60000;
}

// Misma lógica que usa el badge visual (FINALIZADO/SORTEANDO): si ya hay números
// cargados para el slot que se está mostrando, NO está en vivo, aunque el reloj
// todavía esté dentro de la ventana horaria del sorteo.
function estaSorteando() {
  const d = datos[slotEfectivo.key];
  if (!d) return false;
  const hayNumeros = provKeys.some(p => d[p].some(n => n !== '----' && n !== '——'));
  const partes = slotEfectivo.fecha.split('-');
  const fechaSorteo = new Date(parseInt(partes[0]), parseInt(partes[1]) - 1, parseInt(partes[2]));
  const esDomingo = fechaSorteo.getDay() === 0;
  if (esDomingo || hayNumeros) return false; // ya está FINALIZADO
  return slotEfectivo.live;
}

// Se llama cada 30 segundos (junto con el resto de las actualizaciones). Si todavía no
// llegó el momento del bloque, no hace nada. Si llegó pero justo hay un sorteo en vivo,
// se saltea esta vez (no reintenta) y programa la siguiente normalmente.
async function intentarMostrarBloqueCarteles() {
  if (bloqueCartelesEnCurso) return;
  if (proximaRotacionCarteles === null || Date.now() < proximaRotacionCarteles) return;

  // Se reprograma YA, se muestre o no el bloque esta vez
  programarProximaRotacionCarteles();

  if (estaSorteando()) return; // coincide con "SORTEANDO" de verdad: se saltea esta vez

  await cargarConfigCarteles(); // trae la lista más fresca posible antes de mostrarla
  if (!cartelesConfig.lista || cartelesConfig.lista.length === 0) return;

  bloqueCartelesEnCurso = true;
  for (const cartel of cartelesConfig.lista) {
    mostrarCartelOverlay(cartel);
    await esperarMs((cartel.duracion_segundos || 5) * 1000);
  }
  ocultarCartelOverlay();
  bloqueCartelesEnCurso = false;
}

async function aplicarConfigVisual() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/configuracion_visual?agencia_id=eq.${URL_AGENCIA_ENCODED}`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const rows = await res.json();
    if (!rows || rows.length === 0) return;

    const cfg = {};
    rows.forEach(r => {
      if (r.clave === 'tv') {
        cfg.tv = r.valor;
      } else if (!r.clave.startsWith('numeros_')) {
        cfg[r.clave] = r.valor + 'px';
      }
    });

    let style = document.getElementById('estilo-dinamico');
    if (!style) {
      style = document.createElement('style');
      style.id = 'estilo-dinamico';
      document.head.appendChild(style);
    }

    style.textContent = `
      .num-cell { font-size: ${cfg.normal || '22px'} !important; }
      .num-cell.primero { font-size: ${cfg.primero || '34px'} !important; }
      .cabeza-num { font-size: ${cfg.cabeza || '18px'} !important; }
      .cabeza-prov { font-size: ${cfg.prov || '14px'} !important; }
      .col-cabezas { width: ${cfg['ancho-cabezas'] || '240px'} !important; }
    `;
  } catch(e) { console.error('Error config visual:', e); }
}

// =====================
// FECHA DE CONSULTA — centralizada
// =====================
function fechaLocalStr(d) {
  // Usa fecha LOCAL (Argentina) en lugar de UTC para evitar desfase horario
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${yyyy}-${mm}-${dd}`;
}

function getFechaConsulta() {
  const now = new Date();
  const diaSemana = now.getDay(); // 0=domingo
  const tm = now.getHours()*60 + now.getMinutes();
  const fecha = new Date();

  // Domingo: mostrar nocturna del sábado
  if (diaSemana === 0) {
    fecha.setDate(fecha.getDate() - 1);
    return fechaLocalStr(fecha);
  }

  // Antes de las 10:15 cualquier día: nocturna del día anterior
  if (tm < 10*60+15) {
    fecha.setDate(fecha.getDate() - 1);
    return fechaLocalStr(fecha);
  }

  return fechaLocalStr(fecha);
}

// INIT
// =====================
async function calcularYCargarSlotEfectivo() {
  const natural = getSorteoActual();
  const fechaNatural = getFechaConsulta();

  await cargarMapaSorteosActivos(fechaLocalStr(new Date()));
  const resuelto = resolverSlotEfectivo(fechaNatural, natural.key);
  const huboFeriado = (resuelto.fecha !== fechaNatural || resuelto.sorteoKey !== natural.key);

  slotEfectivo = {
    fecha: resuelto.fecha,
    key: resuelto.sorteoKey,
    label: LABELS_SORTEO[resuelto.sorteoKey],
    live: huboFeriado ? false : natural.live
  };
}

async function init() {
  await calcularYCargarSlotEfectivo();

  datos[slotEfectivo.key] = await cargarDatosReales(slotEfectivo.fecha, slotEfectivo.key);
  await cargarCabezasReales(slotEfectivo.fecha, slotEfectivo.key);
  await cargarNumeroSorteo(slotEfectivo.fecha, slotEfectivo.key);
  await aplicarConfigVisual();
  await cargarCantidadTV(slotEfectivo.key);
  render();

  await cargarConfigCarteles();
  programarProximaRotacionCarteles();

  // Actualizar cada 30 segundos
  setInterval(async () => {
    await calcularYCargarSlotEfectivo();
    datos[slotEfectivo.key] = await cargarDatosReales(slotEfectivo.fecha, slotEfectivo.key);
    await cargarCabezasReales(slotEfectivo.fecha, slotEfectivo.key);
    await cargarNumeroSorteo(slotEfectivo.fecha, slotEfectivo.key);
    await aplicarConfigVisual();
    await cargarCantidadTV(slotEfectivo.key);
    render();
    await intentarMostrarBloqueCarteles();
  }, 30000);
}

init();
</script>
